<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="SkyCast preview">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3c72"/>
      <stop offset="100%" stop-color="#2a5298"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00d8ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="960" cy="120" r="160" fill="#ffffff" fill-opacity="0.08"/>
  <circle cx="160" cy="560" r="220" fill="#ffffff" fill-opacity="0.05"/>
  <rect x="72" y="70" width="220" height="44" rx="22" fill="url(#pill)"/>
  <text x="182" y="99" text-anchor="middle" fill="#032336" font-family="Arial, sans-serif" font-size="20" font-weight="700">Projet live</text>
  <text x="72" y="220" fill="#ffffff" font-family="Arial, sans-serif" font-size="70" font-weight="800">SkyCast Pro</text>
  <text x="72" y="280" fill="#d5e8ff" font-family="Arial, sans-serif" font-size="34">Meteo en direct</text>
  <text x="72" y="342" fill="#c4d8f2" font-family="Arial, sans-serif" font-size="28">Recherche ville, temperature, humidite, vent</text>
  <g transform="translate(820 320)">
    <rect x="-30" y="-30" width="360" height="200" rx="24" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.25"/>
    <text x="20" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="82">27°</text>
    <text x="20" y="88" fill="#d8e7fb" font-family="Arial, sans-serif" font-size="28">Abidjan, CI</text>
    <text x="20" y="132" fill="#d8e7fb" font-family="Arial, sans-serif" font-size="24">Vent 13 km/h</text>
  </g>
</svg>
