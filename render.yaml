services:
  - type: web
    name: zimayblog-web
    env: python
    region: oregon
    branch: main
    root: zimayblog
    buildCommand: pip install -r requirements.txt
    postBuildCommand: python manage.py migrate --noinput
    startCommand: gunicorn zimayblog.wsgi:app --workers 3 --log-file -
    envVars:
      - key: DISABLE_COLLECTSTATIC
        value: 1
      - key: SECRET_KEY
        value: "replace-this-with-production-secret"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: DATABASE_URL
        value: "your-postgresql-url-here"

# Note:
# 1. Configure DATABASE_URL in Render as PostgreSQL managed service, and migrate with `python manage.py migrate`.
# 2. Set SECRET_KEY and other sensitive env vars in Render dashboard.
# 3. Enable SSL redirection if needed and set `SECURE_SSL_REDIRECT=True` in env.

# IMPORTANT: Django App Module Configuration
# - The Django app is named 'app'
# - INSTALLED_APPS in settings.py: 'app'
# - DJANGO_SETTINGS_MODULE: zimayblog.settings
# - WSGI module: app.wsgi (variable: app)
# - Alternative: gunicorn zimayblog.wsgi:application
# - Render uses Procfile for deployment, which now uses app.wsgi:app
