services:
  - type: web
    name: zimayblog-web
    env: python
    region: oregon
    branch: main
    root: .
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn zimayblog.wsgi:application
    envVars:
      - key: SECRET_KEY
        value: "django-insecure-65l*e6v=#aq*rb9q-78#pr#u5h3urvjl#+zz#v0&ivz2n+$2xn"
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "zimayblog.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://zimayblog.onrender.com"
      - key: PYTHONPATH
        value: "/opt/render/project/src"

# Note:
# 1. Configure DATABASE_URL in Render as PostgreSQL managed service.
# 2. Set SECRET_KEY and other sensitive env vars in Render dashboard.
# 3. Enable SSL redirection if needed and set `SECURE_SSL_REDIRECT=True` in env.

# IMPORTANT: Django App Module Configuration
# - The Django app is named 'app'
# - INSTALLED_APPS in settings.py: 'app'
# - DJANGO_SETTINGS_MODULE: zimayblog.settings
# - WSGI module: zimayblog.wsgi (variable: application)
# - Alternative: gunicorn zimayblog.wsgi:application
# - Render uses this render.yaml configuration for deploys
