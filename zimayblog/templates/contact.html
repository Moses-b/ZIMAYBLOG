{% extends 'base.html' %}
{% block title %}Contact - Moses Zimay{% endblock %}
{% block content %}
<section>
  <h1>Contact</h1>
  <p>Prêt à transformer vos services finance & digital ? Contactez-moi 24/7.</p>
  <div class="contact-grid">
    <div class="glass-card" style="padding:1rem;">
      <p>📞 +225 01 23 45 67 89</p>
      <p>📧 <a href="mailto:moses@zimayconsulting.com">moses@zimayconsulting.com</a></p>
      <p>💬 <a href="https://wa.me/2250123456789">WhatsApp direct</a></p>
    </div>
    <form action="/contact/" method="post">
      <input type="text" name="name" placeholder="Nom complet" required />
      <input type="email" name="email" placeholder="Email" required />
      <textarea name="message" placeholder="Votre demande" rows="5" required></textarea>
      <button class="btn" type="submit">Envoyer</button>
    </form>
  </div>
</section>
{% endblock %}
